version: '3.9'
services:
  nexus-trader:
    build: .
    container_name: nexus_trader
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./public:/app/public:ro
    healthcheck:
      test: ["CMD","wget","-q","--spider","http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
